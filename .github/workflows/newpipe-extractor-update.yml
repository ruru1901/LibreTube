name: NewPipe Extractor update

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-and-build:
    name: Update extractor and build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Check latest NewPipeExtractor commit
        id: extractor
        shell: bash
        run: |
          set -euo pipefail

          latest_sha="$(git ls-remote https://github.com/libre-tube/NewPipeExtractor.git HEAD | awk '{print $1}')"
          latest_version="${latest_sha:0:9}"
          current_version="$(sed -n 's/^newpipeextractor = "\(.*\)"/\1/p' gradle/libs.versions.toml)"

          echo "latest-version=$latest_version" >> "$GITHUB_OUTPUT"
          echo "current-version=$current_version" >> "$GITHUB_OUTPUT"

          if [[ "$current_version" == "$latest_version" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          perl -0pi -e 's/^newpipeextractor = "\K[^"]+/'"$latest_version"'/m' gradle/libs.versions.toml
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        if: steps.extractor.outputs.changed == 'true'
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        if: steps.extractor.outputs.changed == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: libretube-newpipeextractor-${{ steps.extractor.outputs.latest-version }}-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Open update pull request
        if: steps.extractor.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/update-newpipeextractor
          delete-branch: true
          title: "Update NewPipeExtractor to ${{ steps.extractor.outputs.latest-version }}"
          commit-message: "chore: update NewPipeExtractor"
          body: |
            Updates `com.github.libre-tube:NewPipeExtractor` from `${{ steps.extractor.outputs.current-version }}` to `${{ steps.extractor.outputs.latest-version }}`.

            The workflow also builds a debug APK and attaches it to this run as an artifact.
